# Example AgenticMail subagent TOML for Codex.
#
# DO NOT COPY THIS FILE INTO ~/.codex/agents/ BY HAND.
#
# `agenticmail-codex install` (from @agenticmail/codex) discovers every
# AgenticMail account on the master API and generates one file per account
# automatically. The generated files carry:
#
#   - the live agent metadata (id, email, role, owner) baked into the
#     `description` + `developer_instructions`
#   - the canonical persona body that tells the model how to operate this
#     specific inbox (read mail, decide whose turn it is, reply-all the
#     thread, use the right MCP tool with `_account: "<name>"`)
#
# This template exists in the plugin folder for two reasons:
#
#   (a) marketplace discovery — Codex's plugin loader walks the plugin's
#       `agents/` directory and treats any .toml as a subagent definition,
#       so a user who drops the whole plugin-codex/ folder into
#       ~/.codex/plugins/agenticmail/ should see SOMETHING showing up
#       under spawn_agent even before they run `agenticmail-codex install`;
#   (b) documentation — shows the schema Codex's agent loader expects
#       (codex-rs/core/src/config/agent_roles.rs::discover_agent_roles_in_dir).
#
# The generated files under ~/.codex/agents/ supersede this example. If
# you want to author your OWN custom subagent, write a brand-new .toml
# WITHOUT the `# managed-by: @agenticmail/codex` marker — our installer
# leaves user-authored files alone.

# managed-by: @agenticmail/codex (example only — NOT auto-installed)

name = "agenticmail-bridge-example"
description = "Example template — see comments above. The real per-account files are generated by `agenticmail-codex install` into ~/.codex/agents/."
developer_instructions = """
You are a placeholder example. The real persona body is generated per-account by
@agenticmail/codex's installer at runtime — it knows the account name, email,
role, and owner, and embeds them directly. See subagent-template.ts in the
@agenticmail/codex source for the canonical persona shape:

  https://github.com/agenticmail/agenticmail/blob/main/packages/codex/src/subagent-template.ts

The generated persona instructs the agent how to:
  1. Read the inbox + thread context for new mail
  2. Decide if it's THEIR turn to reply (vs a teammate's)
  3. Reply-all on threads using mcp__agenticmail__reply_email with _account
  4. Spawn other AgenticMail agents via spawn_agent({ agent_type: "agenticmail-<name>" })
  5. Use Codex's native tools (Bash, Read, Edit, etc.) for real work — not
     paste source code into emails

If you're seeing this file in your spawn_agent picker, the install hasn't run
yet. Run: agenticmail-codex install
"""
