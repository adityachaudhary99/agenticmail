name: Publish to GitHub Packages

# Mirrors every published package in this monorepo to GitHub Packages
# (npm.pkg.github.com) whenever a GitHub Release is published. Keeps
# the github.com/orgs/agenticmail/packages page in sync with what's on
# npmjs.com so enterprise users who require packages from the GitHub
# registry (compliance, security advisories tied to the repo) can pull
# them by name.
#
# The job tries to publish every package. Two classes of outcome:
#   - exit 0 from npm publish → published ✅
#   - npm publish 409 / "cannot publish over previously published" →
#     already published this version, no-op ✅
#   - anything else (auth failure, build failure, network, etc.) →
#     fails LOUDLY so the maintainer notices. Previously the entire
#     publish step had blanket `continue-on-error: true`, which masked
#     real failures including the matrix gap that left @agenticmail/openclaw
#     17 releases behind on GitHub Packages while every release run
#     reported "success".
#
# Trigger: release publish, so the workflow fires once per actual
# customer-facing release. Also workflow_dispatch for manual backfills.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      # Don't abort the whole matrix if one package fails — independent
      # packages can drift in versions and a duplicate-publish on one
      # shouldn't block the others.
      fail-fast: false
      matrix:
        # Every workspace package that ships to npm publicly should also
        # mirror to GitHub Packages. If you add a new package, add it here
        # AND verify it appears on github.com/orgs/agenticmail/packages
        # after the next release.
        package:
          - packages/core
          - packages/api
          - packages/mcp
          - packages/claudecode
          - packages/codex
          - packages/openclaw
          - agenticmail   # @agenticmail/cli — lives at the monorepo root, not under packages/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@agenticmail'

      # Install dependencies at the repo root so workspace cross-deps
      # resolve before each package's prepublish runs its `tsup` build.
      - name: Install root dependencies
        run: npm ci --ignore-scripts

      # Build the workspace dependencies FIRST. `npm ci --ignore-scripts`
      # only symlinks the workspace packages into node_modules — it does
      # NOT build their dist/. Without this the per-package tsup build
      # fails with "Cannot find module '@agenticmail/...'".
      # Dependency map across the publish matrix:
      #   - every package imports @agenticmail/core
      #   - @agenticmail/cli imports @agenticmail/api, and its `--dts`
      #     build also needs @agenticmail/claudecode + @agenticmail/codex
      #     type declarations (they're bundle-external but still typed)
      # Building core → api → claudecode → codex up front satisfies all
      # seven matrix packages.
      - name: Build workspace dependencies
        run: npm run build:core && npm run build:api && npm run build:claudecode && npm run build:codex

      # Build the package being published. Each package owns its own
      # `npm run build` script (tsup-based); we run it from inside the
      # package directory so the build output lands in that package's
      # dist/, not the root.
      - name: Build ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm run build
          else
            echo "::warning::No build script in ${{ matrix.package }}, skipping build"
          fi

      # Publish with smart 409 handling. We want to:
      #   - succeed on a fresh publish (exit 0)
      #   - succeed on "this version is already published" (a normal
      #     case when only some packages bumped in a release)
      #   - FAIL on anything else (auth, network, registry 5xx, build
      #     output missing, etc.) so the maintainer sees the failure
      #     and doesn't silently drift behind npmjs.com
      #
      # Sentinel strings come from npm CLI + GitHub Packages registry
      # responses for already-published versions:
      #   - "EPUBLISHCONFLICT"
      #   - "cannot publish over the previously published versions"
      #   - "already exists"
      #   - HTTP 409 Conflict
      - name: Publish ${{ matrix.package }}
        id: publish
        working-directory: ${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG: ${{ matrix.package }}
        run: |
          set +e
          OUTPUT=$(npm publish --access public 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -eq 0 ]; then
            VERSION=$(node -p "require('./package.json').version")
            NAME=$(node -p "require('./package.json').name")
            echo "result=published" >> "$GITHUB_OUTPUT"
            echo "name=$NAME" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "✅ Published $NAME@$VERSION"
            exit 0
          fi
          if echo "$OUTPUT" | grep -qiE 'EPUBLISHCONFLICT|cannot publish over|already exists|409 Conflict|conflict.*already exists'; then
            VERSION=$(node -p "require('./package.json').version")
            NAME=$(node -p "require('./package.json').name")
            echo "result=already-published" >> "$GITHUB_OUTPUT"
            echo "name=$NAME" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "ℹ️  $NAME@$VERSION already on GitHub Packages — no-op"
            exit 0
          fi
          echo "::error title=Publish failed for $PKG::npm publish exited $STATUS with an unexpected error. See log above."
          exit $STATUS

      # Per-package summary row in the GitHub Actions summary view so
      # the maintainer can see at a glance which packages landed which
      # versions, without digging through 7 sub-job logs.
      - name: Write run summary
        if: always() && steps.publish.outputs.result != ''
        run: |
          ICON="✅"
          if [ "${{ steps.publish.outputs.result }}" = "already-published" ]; then ICON="ℹ️"; fi
          if [ "${{ steps.publish.outcome }}" = "failure" ]; then ICON="❌"; fi
          {
            echo "| Status | Package | Version | Result |"
            echo "|---|---|---|---|"
            echo "| $ICON | \`${{ steps.publish.outputs.name }}\` | \`${{ steps.publish.outputs.version }}\` | ${{ steps.publish.outputs.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
